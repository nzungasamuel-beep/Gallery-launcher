<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gallery Launcher</title>
  <style>
    body {
      background-color: #3498db; /* blue background */
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;
    }

    #proceedBtn {
      display: none; /* hidden by default */
      padding: 15px 30px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      color: white;
      background-color: #2ecc71;
      margin-top: 20px;
      cursor: pointer;
      transition: background-color 0.3s;
    }

    #proceedBtn:hover {
      background-color: #27ae60;
    }
  </style>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <h1>Welcome to Gallery Launcher</h1>

  <!-- Google Sign-In button -->
  <div id="g_id_onload"
       data-client_id="YOUR_CLIENT_ID"
       data-login_uri=""
       data-auto_prompt="false">
  </div>

  <div class="g_id_signin"
       data-type="standard"
       data-shape="rectangular"
       data-theme="outline"
       data-text="signin_with"
       data-size="large"
       data-logo_alignment="left">
  </div>

  <!-- Proceed button -->
  <button id="proceedBtn" onclick="goToUpload()">Proceed to Upload</button>

  <script>
    // This function will redirect to your upload page
    function goToUpload() {
      window.location.href = "upload.html";
    }

    // Listen for Google Sign-In success
    function handleCredentialResponse(response) {
      console.log("Google user signed in:", response);
      // Show the Proceed button
      document.getElementById("proceedBtn").style.display = "block";
    }

    window.onload = function () {
      google.accounts.id.initialize({
        client_id: "YOUR_CLIENT_ID",
        callback: handleCredentialResponse
      });
      google.accounts.id.renderButton(
        document.querySelector(".g_id_signin"),
        { theme: "outline", size: "large" }  // customization
      );
    }
  </script>
</body>
</html>
