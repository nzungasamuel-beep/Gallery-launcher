<!DOCTYPE html>
<html>
<head>
<title>My Gallery</title>

<style>
body {
  background:#111;
  color:white;
  font-family:Arial;
  text-align:center;
  margin:0;
}

/* top bar */
.topbar {
  display:flex;
  justify-content:flex-end;
  padding:15px;
  background:#222;
}

/* menu button */
.menu-btn {
  font-size:24px;
  cursor:pointer;
  background:none;
  border:none;
  color:white;
}

/* dropdown */
.dropdown {
  display:none;
  position:absolute;
  right:20px;
  top:60px;
  background:#333;
  border-radius:8px;
  box-shadow:0 4px 8px rgba(0,0,0,0.5);
  overflow:hidden;
  z-index:10;
}

.dropdown button {
  display:block;
  width:200px;
  padding:12px;
  border:none;
  background:none;
  color:white;
  text-align:left;
  cursor:pointer;
}

.dropdown button:hover {
  background:#444;
}

/* gallery */
.gallery {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  margin-top:20px;
}

.photo-box {
  position:relative;
  margin:10px;
}

.photo-box img {
  width:200px;
  border-radius:10px;
  cursor:pointer;
  display:block;
}

/* checkboxes (hidden by default) */
.checkbox {
  position:absolute;
  top:8px;
  right:8px;
  width:25px;
  height:25px;
  background:white;
  border-radius:4px;
  border:2px solid #222;
  cursor:pointer;
  display:none;
  font-size:18px;
  line-height:20px;
  color:#3498db;
  text-align:center;
  user-select:none;
}

/* show tick when selected */
.checkbox.selected::after {
  content: '✔';
}

/* highlight selected image */
.photo-box.selected img {
  border:3px solid #3498db;
}

</style>
</head>

<body>

<div class="topbar">
  <button class="menu-btn" onclick="toggleMenu()">⋮</button>

  <div class="dropdown" id="menu">
    <button onclick="toggleSelectMode()">Select</button>
    <button onclick="downloadSelected()">Download</button>
    <button onclick="deleteSelected()">Delete</button>
    <button onclick="editSelected()">Edit / Crop</button>
  </div>
</div>

<h1>My Photos</h1>

<div class="gallery" id="gallery"></div>

<script>
let photos = JSON.parse(localStorage.getItem("photos")) || [];
let gallery = document.getElementById("gallery");

let selectedIndexes = [];
let selectMode = false; // checkbox visibility

function displayPhotos() {
  gallery.innerHTML = "";
  photos.forEach((photo,index) => {
    let box = document.createElement("div");
    box.className = "photo-box";

    let img = document.createElement("img");
    img.src = photo;

    let checkbox = document.createElement("div");
    checkbox.className = "checkbox";

    if(selectMode) checkbox.style.display = "block";

    if(selectedIndexes.includes(index)) {
      checkbox.classList.add("selected");
      box.classList.add("selected");
    }

    checkbox.onclick = function(e) {
      e.stopPropagation();
      if(selectedIndexes.includes(index)) {
        selectedIndexes = selectedIndexes.filter(i => i!==index);
      } else {
        selectedIndexes.push(index);
      }
      displayPhotos();
    }

    box.appendChild(img);
    box.appendChild(checkbox);
    gallery.appendChild(box);
  });
}

displayPhotos();

/* menu toggle */
function toggleMenu(){
  let menu = document.getElementById("menu");
  menu.style.display = menu.style.display==="block" ? "none" : "block";
}

/* select mode */
function toggleSelectMode(){
  selectMode = !selectMode;
  if(!selectMode) selectedIndexes=[]; // clear selection when exiting
  displayPhotos();
}

/* download selected */
function downloadSelected(){
  selectedIndexes.forEach(i=>{
    let a=document.createElement("a");
    a.href=photos[i];
    a.download="photo.png";
    a.click();
  });
}

/* delete selected */
function deleteSelected(){
  if(selectedIndexes.length===0) return;
  photos = photos.filter((_,i)=>!selectedIndexes.includes(i));
  localStorage.setItem("photos",JSON.stringify(photos));
  selectedIndexes=[];
  displayPhotos();
}

/* edit selected */
function editSelected(){
  if(selectedIndexes.length===0){
    alert("Select a photo first!");
    return;
  }

  // Store selected photo(s) in localStorage
  let selectedPhotos = selectedIndexes.map(i => photos[i]);
  localStorage.setItem("editPhotos", JSON.stringify(selectedPhotos));

  // Redirect to edit page
  window.location.href = "edit.html";
}
</script>

</body>
</html>
